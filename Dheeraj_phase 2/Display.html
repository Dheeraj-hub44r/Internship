<!DOCTYPE html>
<html>
<head>
  <title>Display</title>

  <style>
    body{
      font-family: Arial;
      text-align: center;
    }

    .box{
      padding: 20px;
      margin: 10px;
      color: white;
      
    }

    .block{
      display: block;
      background: red;
    }

    .inline{
      display: inline;
      background: orange;
      padding: 10px;
    }

    .inline-block{
      display: inline-block;
      width: 120px;
      height: 120px;
      background: blue;
      margin: 10px;
    }

    img{
      width: 100%;
      height: 80px;
    }
  </style>
</head>

<body>

<h2>Display Examples</h2>

<div class="box block">
  <p>Block Element</p>
  <img src="/photos/bleach 2.jpg" alt="img">
</div>
<p>Inline elements</p>
<span class="inline">Inline 1</span>
<span class="inline">Inline 2</span>

<br><br>

<p>Inline Block Elements</p>
<div class="inline-block">
  <img src="/photos/bleach.jpg" alt="img">
  <p>Item 1</p>
</div>

<div class="inline-block">
  <img src="/photos/Zenitsu.jpg" alt="img">
  <p>Item 2</p>
</div>

<div class="inline-block">
  <img src="/photos/2e3f3dd117098b5e442bcb77681e7034.png" alt="img">
  <p>Item 3</p>
</div>

</body>
</html>
