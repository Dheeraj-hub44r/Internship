<!DOCTYPE html>
<html>
<head>
  <title>Flexbox</title>

  <style>
    .colunm_container {
      display: flex;
      flex-direction: column;
      justify-content:space-between;
      align-items: center;
      background: lightblue;
      padding:10px;
      margin:50px
    }

    .row_container {
      display: flex;
      flex-direction: row;
      justify-content:space-between;
      align-items: center;
      background: lightblue;
      padding: 20px;
    }

    .item {
      width: 80px;
      height: 80px;
      margin:10px;
      padding:20px;
      background: blue;
      color: white;
      text-align: center;
      line-height: 60px;
    }
  </style>
</head>

<body>

<h2>Flexbox Layout</h2>

<div class="colunm_container">
  <div class="item">Item 1</div>
  <div class="item">Item 2</div>
  <div class="item">Item 3</div>
</div>
<div class="row_container">
  <div class="item">Item 1</div>
  <div class="item">Item 2</div>
  <div class="item">Item 3</div>

</div>

</body>
</html>
