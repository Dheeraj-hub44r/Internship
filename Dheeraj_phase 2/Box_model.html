<!DOCTYPE html>
<html>
<head>
  <title> Box Model</title>

  <style>
    .box1 {
      background: lightblue;
      padding: 20px;
      border: 2px solid black;
      margin: 10px;
    }

    .box2 {
      background: lightgreen;
      margin: 30px;
      border: 2px solid black;
      padding: 5px;
    }

    .box3 {
      background: lightcoral;
      padding: 40px;
      margin: 40px;
      border: 2px solid black;
    }

    
  </style>
</head>

<body>

<h2>Box Model Examples</h2>

<div class="box1">More Padding</div>
<div class="box2">More Margin</div>
<div class="box3">Both Margin and Padding</div>



</body>
</html>
